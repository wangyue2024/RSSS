# 20 Base Trading Strategies (Rhai Generation Prompts)

# Group 1: Market Makers (Liquidity Providers)
strategies:
  - name: "pure_market_maker"
    desc: "A pure market maker. It places limit buy and sell orders at a fixed symmetric distance (spread) from the current `market.price`. It continuously cancels old orders and replays new ones to maintain its position."
  
  - name: "inventory_averse_mm"
    desc: "A market maker that actively manages its inventory (`account.stock`). If inventory is high (e.g., > 1000), it skews its quotes: placing sell orders closer to the market price and buy orders further away. If inventory is negative or 0, it does the opposite."
    
  - name: "imbalance_driven_mm"
    desc: "A market maker that watches `market.order_imbalance`. If the imbalance is highly positive (heavy buy pressure), it shifts both its bid and ask prices upward to avoid adverse selection. If negative, it shifts them downward."

  - name: "volatility_adaptive_mm"
    desc: "A market maker that adjusts its spread based on `market.std_dev`. When volatility is high, it widens its spread significantly to protect itself. When volatility is low, it narrows the spread to compete for fills."

# Group 2: Trend & Momentum Followers
  - name: "fast_ma_crossover"
    desc: "A classic trend follower. It uses `market.ma_5` and `market.ma_20`. It buys at market price when MA_5 crosses above MA_20, and sells all its inventory when MA_5 crosses below MA_20."

  - name: "breakout_sniper"
    desc: "A breakout strategy. It monitors the current price against `market.high_20`. If the price breaks above the 20-tick high, it aggressively buys. It sets a static stop-loss a few ticks below its average entry price (`account.avg_cost`)."

  - name: "slope_momentum_chaser"
    desc: "A momentum strategy that uses `math.slope(market.history_prices)`. If the recent price slope is highly positive and accelerating, it buys aggressively. It panic sells if the slope suddenly turns negative."

  - name: "order_flow_follower"
    desc: "A micro-structural strategy. It entirely ignores price and moving averages. Instead, it looks at `market.buy_volume` and `market.sell_volume`. If `buy_volume` is 3x larger than `sell_volume` in the current tick, it joins the crowd and buys."

  - name: "exhaustion_reversal"
    desc: "A contrarian momentum strategy. It looks for climax tops. If the price has gone up significantly (high > ma_60) but the current `market.volume` suddenly drops to near zero, it assumes exhaustion and initiates a short/sell position."

# Group 3: Mean Reverters
  - name: "vwap_pullback"
    desc: "A mean reversion strategy based on VWAP. If the current price dips significantly below `market.vwap` (defined by a threshold), it buys, expecting a bounce. It sells once the price reverts back to VWAP."

  - name: "bollinger_fader"
    desc: "A statistical reversion strategy. It calculates bands using `market.ma_20 +/- 2 * market.std_dev`. It places a limit buy order at the lower band and a limit sell order at the upper band."

  - name: "micro_tick_reverter"
    desc: "A very short-term (1 tick) mean reversion strategy. It assumes tick-by-tick prices are a random walk. If the price drops this tick, it places a limit buy order slightly below the new price. If it rises, it sells."

  - name: "atr_mean_reversion"
    desc: "It uses `market.atr_14` (Average True Range). It waits for the price to deviate from `market.ma_20` by more than 1.5x ATR. Once deviated, it assumes an over-extension and trades in the opposite direction."

# Group 4: Institutional Execution & Predatory Algos
  - name: "twap_execution"
    desc: "Time-Weighted Average Price execution. It has a large target position it wants to accumulate (e.g., 50,000 shares). It ignores price and simply submits a market buy order for a fixed small slice (e.g., 500 shares) every N ticks, until the target is reached."

  - name: "vwap_execution"
    desc: "Volume-Weighted Average Price execution. It wants to buy a large amount, but its slicing is dynamic. It checks the recent `market.volume`; if the market volume is high, it buys more. If low, it buys less, aiming to blend in."

  - name: "iceberg_placer"
    desc: "An iceberg order strategy. It wants to sell a massive amount of shares. However, it only places a limit sell order for a very tiny fraction at the best ask price. Once `account.last_order_status` indicates a fill, it immediately replenishes the small order."

  - name: "stop_loss_hunter"
    desc: "A predatory strategy. It attempts to trigger retail stop losses. If it senses a cluster of orders slightly below the current price, it might aggressively market sell to push the price down through the support, then quickly buy back at the depressed price."

# Group 5: Noise & Exogenous Traders
  - name: "drunkards_walk"
    desc: "A high-frequency random noise trader providing essential market entropy. Every tick, use `rng.rand_int(0, 99)`. If < 20, submit a limit buy near the current price (within 1% below). If > 80, submit a limit sell near the current price (within 1% above). The quantity should be randomized between 1 and 50 shares using `rng.rand_int(1, 50)`. This agent trades frequently and provides baseline liquidity."

  - name: "fat_tail_fat_finger"
    desc: "A noise trader that mostly places small random limit orders (1-10 shares near the current price, ~30% chance per tick). However, there is a 1% chance every tick (`rng.rand_int(0, 99) == 0`) that it submits a market order for 50-200 shares in a random direction, simulating a 'fat finger' event."

  - name: "retail_stop_limit"
    desc: "A typical retail trader. It enters completely randomly once. Then, it places a strict take-profit limit order 5% above its cost, and a strict stop-loss market order 2% below its cost. It just waits for one of them to hit."

# Group 6: Counter-Trend & Value Anchoring (CRITICAL for market balance)
  - name: "value_anchor_buyer"
    desc: "A value investor who believes the stock is worth 100 yuan (100_000_000 micros). When the price drops below this fair value, it progressively buys more: if price < fair_value * 95 / 100, buy small. If price < fair_value * 90 / 100, buy aggressively. It NEVER sells below fair value. It provides strong downside support. Use `rng.rand_int` to randomize the fair value slightly (95_000_000 to 105_000_000)."

  - name: "value_anchor_seller"
    desc: "A value investor who believes the stock is worth 100 yuan. When the price rises above fair value, it progressively sells: if price > fair_value * 105 / 100, sell small. If price > fair_value * 110 / 100, sell aggressively. It NEVER buys above fair value. It provides strong upside resistance. Use `rng.rand_int` to randomize the fair value slightly."

  - name: "range_trader"
    desc: "A range-bound trader that tracks the 20-tick high and low (`market.high_20` and `market.low_20`). It places a limit buy near the low_20 and a limit sell near the high_20. It profits from mean reversion within the range. If the range narrows (low spread), it increases position size. Cancels and re-places orders every tick."

  - name: "periodic_rebalancer"
    desc: "An index fund-like agent that maintains a target allocation of 50% cash / 50% stock (by value). Every 10 ticks, it calculates its current allocation. If stock value > 55% of equity, it sells some stock. If stock value < 45%, it buys some stock. Uses limit orders near the current price. This creates natural counter-trend flow."

  - name: "contrarian_accumulator"
    desc: "A contrarian long-term accumulator. It watches `market.rsi_14`. When RSI drops below 3000 (oversold), it aggressively buys using limit orders below the current price. When RSI rises above 7000 (overbought), it sells. It trades infrequently but in larger sizes (20-100 shares). It is the opposite of momentum traders."
